<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Love Letter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Parisienne&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --beige: #F5EFE6;
      --blush: #FADADD;
      --ivory: #FFF8F3;
      --rose: #E8B4B8;
      --rose-dark: #B77782;
      --ink: #5B3D3E;
      --soft-brown: #9A7B67;
      --paper-shadow: rgba(100, 70, 55, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: var(--beige);
      color: var(--ink);
      font-family: "Cormorant Garamond", serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.75), transparent 28%),
        radial-gradient(circle at 80% 80%, rgba(250,218,221,0.45), transparent 32%),
        repeating-linear-gradient(45deg, rgba(120,90,70,0.025) 0 1px, transparent 1px 6px),
        repeating-linear-gradient(-45deg, rgba(255,255,255,0.18) 0 1px, transparent 1px 7px);
      mix-blend-mode: multiply;
      z-index: 20;
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 21;
      opacity: 0.13;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 260 260' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      transition: opacity 1400ms cubic-bezier(0.22, 1, 0.36, 1), transform 1400ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .landing {
      background:
        radial-gradient(circle at 50% 46%, rgba(255,248,243,0.88), transparent 34%),
        linear-gradient(135deg, #F5EFE6 0%, #FFF8F3 45%, #FADADD 140%);
      z-index: 2;
    }

    .letter-screen {
      opacity: 0;
      transform: scale(1.025);
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,0.85), transparent 42%),
        linear-gradient(135deg, #FFF8F3 0%, #F5EFE6 78%);
      z-index: 1;
    }

    body.open .landing {
      opacity: 0;
      transform: scale(0.985);
      pointer-events: none;
    }

    body.open .letter-screen {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
      z-index: 3;
    }

    .ambient {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      color: rgba(232, 180, 184, 0.58);
      font-size: clamp(14px, 1.8vw, 24px);
      animation: floatHeart var(--speed) cubic-bezier(0.45, 0, 0.55, 1) infinite; will-change: transform, opacity;
      opacity: 0.65;
      filter: blur(0.1px);
    }

    @keyframes floatHeart {
      0% { transform: translate3d(0, 0, 0) rotate(-6deg) scale(1); }
      50% { transform: translate3d(8px, -26px, 0) rotate(6deg) scale(1.04); }
      100% { transform: translate3d(0, 0, 0) rotate(-6deg) scale(1); }
    }

    .petal {
      position: absolute;
      width: 14px;
      height: 24px;
      border-radius: 80% 0 80% 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(250,218,221,0.8));
      opacity: 0.55;
      animation: fallPetal var(--fall) cubic-bezier(0.45, 0, 0.55, 1) infinite; will-change: transform, opacity;
    }

    @keyframes fallPetal {
      0% { transform: translate3d(0, -10vh, 0) rotate(0deg); opacity: 0; }
      15% { opacity: 0.45; }
      50% { transform: translate3d(28px, 48vh, 0) rotate(130deg); opacity: 0.5; }
      100% { transform: translate3d(54px, 110vh, 0) rotate(260deg); opacity: 0; }
    }

    .lily-cluster {
      position: absolute;
      width: clamp(170px, 22vw, 330px);
      opacity: 0.92;
      filter: drop-shadow(0 18px 24px rgba(95, 65, 55, 0.13));
      animation: breathe 8.5s cubic-bezier(0.45, 0, 0.55, 1) infinite; will-change: transform;
    }

    .lily-cluster.left-top { left: -22px; top: -18px; transform: rotate(-15deg); }
    .lily-cluster.right-bottom { right: -24px; bottom: -16px; transform: rotate(165deg); animation-delay: -2s; }
    .lily-cluster.left-bottom { left: 4vw; bottom: 5vh; transform: rotate(-34deg) scale(0.72); opacity: 0.42; }
    .lily-cluster.right-top { right: 5vw; top: 8vh; transform: rotate(145deg) scale(0.64); opacity: 0.36; }

    @keyframes breathe {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(0, -7px, 0) scale(1.018); }
    }

    .centerpiece {
      position: relative;
      width: min(86vw, 720px);
      height: min(72vh, 580px);
      display: grid;
      place-items: center;
    }

    .caption { display:none; }

    .pigeon {
      position: absolute;
      top: 15%;
      left: 16%;
      width: 138px;
      height: 86px;
      animation: pigeonFloat 7.2s cubic-bezier(0.45, 0, 0.55, 1) infinite; will-change: transform;
      filter: drop-shadow(0 14px 20px rgba(90,60,50,0.12));
      z-index: 3;
    }

    @keyframes pigeonFloat {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(-3deg); }
      50% { transform: translate3d(8px, -14px, 0) rotate(2deg); }
    }

    .pigeon svg { width: 100%; height: 100%; }

    .envelope-wrap {
      position: relative;
      width: min(76vw, 480px);
      height: 310px;
      cursor: pointer;
      perspective: 1100px;
      transition: transform 700ms cubic-bezier(0.22, 1, 0.36, 1), filter 700ms cubic-bezier(0.22, 1, 0.36, 1); will-change: transform;
      z-index: 5;
    }

    .envelope-wrap:hover {
      transform: translateY(-7px) scale(1.018);
      filter: drop-shadow(0 30px 42px rgba(95, 66, 52, 0.18));
    }

    .envelope {
      position: absolute;
      inset: 32px 0 0;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.44), transparent 40%),
        linear-gradient(180deg, #FFF8F3, #F2E4D5);
      box-shadow: 0 34px 65px rgba(95, 66, 52, 0.17), inset 0 0 0 1px rgba(160,120,95,0.18);
      overflow: hidden;
    }

    .envelope::before,
    .envelope::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    .envelope::before {
      clip-path: polygon(0 0, 50% 58%, 100% 0, 100% 100%, 0 100%);
      background: linear-gradient(135deg, #F4E6D8, #FFF8F3 50%, #EEDCCD);
    }

    .envelope::after {
      clip-path: polygon(0 100%, 50% 42%, 100% 100%);
      background: linear-gradient(180deg, #FFF8F3, #EEDFD1);
      box-shadow: inset 0 1px 0 rgba(130,90,70,0.14);
    }

    .flap {
      position: absolute;
      left: 0;
      right: 0;
      top: 32px;
      height: 180px;
      background: linear-gradient(180deg, #FFF8F3, #EEDCCD);
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      transform-origin: top;
      z-index: 3;
      box-shadow: inset 0 -1px 0 rgba(130,90,70,0.12);
      transition: transform 1500ms cubic-bezier(0.22, 1, 0.36, 1); will-change: transform;
    }

    body.seal-clicked .flap {
      transform: rotateX(178deg) translateY(-6px);
    }

    .inner-letter {
      position: absolute;
      left: 10%;
      bottom: 45px;
      width: 80%;
      height: 210px;
      border-radius: 8px 8px 18px 18px;
      background:
        repeating-linear-gradient(0deg, rgba(130,90,70,0.035) 0 1px, transparent 1px 28px),
        linear-gradient(145deg, #FFFDF8, #F4E6D6);
      box-shadow: 0 16px 38px rgba(95,66,52,0.14);
      z-index: 2;
      transform: translateY(86px);
      transition: transform 1550ms cubic-bezier(0.22, 1, 0.36, 1); will-change: transform;
    }

    body.seal-clicked .inner-letter {
      transform: translateY(-130px) scale(1.012);
    }

    .wax-seal {
      position: absolute;
      left: 50%;
      top: 158px;
      width: 112px;
      height: 112px;
      transform: translateX(-50%);
      border: 0;
      background: transparent;
      cursor: pointer;
      z-index: 10;
      padding: 0;
      border-radius: 50%;
      overflow: visible;
      transition: transform 900ms cubic-bezier(0.16, 1, 0.3, 1), filter 900ms cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, opacity, filter;
      filter: drop-shadow(0 18px 28px rgba(80, 38, 38, 0.34));
    }

    .wax-seal img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      transform: translateZ(0) scale(1);
      transition: transform 900ms cubic-bezier(0.16, 1, 0.3, 1), filter 900ms ease;
      will-change: transform, opacity;
    }

    .seal-shine {
      position: absolute;
      inset: 6px;
      z-index: 2;
      border-radius: 50%;
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
    }

    .seal-shine::before {
      content: "";
      position: absolute;
      top: -25%;
      left: -90%;
      width: 54%;
      height: 150%;
      background: linear-gradient(110deg, transparent, rgba(255, 238, 218, 0.38), transparent);
      transform: rotate(18deg);
    }

    .wax-seal:hover {
      transform: translateX(-50%) translateY(-4px) scale(1.045);
      filter: drop-shadow(0 28px 42px rgba(80, 38, 38, 0.44));
    }

    .wax-seal:hover .seal-shine {
      opacity: 1;
    }

    .wax-seal:hover .seal-shine::before {
      animation: cinematicShine 1350ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .wax-seal:active {
      transform: translateX(-50%) translateY(0) scale(0.985);
    }

    @keyframes cinematicShine {
      0% { left: -90%; opacity: 0; }
      20% { opacity: 1; }
      100% { left: 140%; opacity: 0; }
    }

    body.seal-clicked .wax-seal {
      pointer-events: none;
      animation: sealDriftAway 1450ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    body.seal-clicked .wax-seal img {
      animation: sealMicroCrack 1450ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transform-origin: 50% 50%;
    }

    body.seal-clicked .seal-shine {
      opacity: 1;
    }

    body.seal-clicked .seal-shine::before {
      animation: cinematicShine 900ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes sealMicroCrack {
      0% { transform: scale(1) rotate(0deg); filter: brightness(1); }
      18% { transform: scale(1.035) rotate(-1.5deg); filter: brightness(1.08); }
      34% { transform: scale(1.065) rotate(1.2deg); filter: brightness(1.03); }
      52% { transform: scale(1.02) rotate(-0.8deg); }
      72% { transform: scale(0.92) rotate(5deg); opacity: 0.92; }
      100% { transform: scale(0.62) rotate(14deg) translate3d(18px, 28px, 0); opacity: 0; filter: blur(1px); }
    }

    @keyframes sealDriftAway {
      0% { filter: drop-shadow(0 18px 28px rgba(80, 38, 38, 0.34)); }
      65% { filter: drop-shadow(0 32px 44px rgba(80, 38, 38, 0.42)); }
      100% { filter: drop-shadow(0 8px 14px rgba(80, 38, 38, 0)); }
    }

    .instruction { display:none; }

    .letter-paper {
      position: relative;
      width: min(82vw, 620px);
      min-height: min(78vh, 730px);
      padding: clamp(44px, 7vw, 78px);
      border-radius: 18px 24px 18px 28px;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.85), transparent 28%),
        repeating-linear-gradient(0deg, rgba(139,99,82,0.04) 0 1px, transparent 1px 34px),
        linear-gradient(145deg, #FFFDF8, #F4E6D7);
      box-shadow:
        0 36px 85px rgba(95, 66, 52, 0.19),
        inset 0 0 0 1px rgba(135, 95, 77, 0.11);
      transform: rotate(-0.4deg);
    }

    .letter-paper::before,
    .letter-paper::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: inherit;
    }

    .letter-paper::before {
      inset: 12px;
      border: 1px solid rgba(183,119,130,0.18);
    }

    .letter-paper::after {
      inset: 0;
      background: linear-gradient(90deg, rgba(122,80,62,0.08), transparent 13%, transparent 88%, rgba(122,80,62,0.06));
      mix-blend-mode: multiply;
    }

    .letter-title {
      font-family: "Playfair Display", serif;
      text-align: center;
      font-size: clamp(20px, 3vw, 31px);
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(91,61,62,0.62);
      margin-bottom: 42px;
    }

    .letter-text {
      position: relative;
      z-index: 2;
      white-space: pre-line;
      font-family: "Parisienne", cursive;
      font-size: clamp(34px, 5.4vw, 54px);
      line-height: 1.28;
      color: rgba(91,61,62,0.9);
      text-shadow: 0.25px 0.25px 0 rgba(91,61,62,0.18);
    }

    .letter-text {
      opacity: 0;
      transform: translateY(10px);
    }

    body.open .letter-text {
      animation: softInkReveal 1800ms cubic-bezier(0.22, 1, 0.36, 1) 450ms forwards;
    }

    @keyframes softInkReveal {
      from { opacity: 0; transform: translateY(10px); filter: blur(2px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    .corner-lilies {
      position: absolute;
      width: clamp(130px, 19vw, 250px);
      pointer-events: none;
      opacity: 0.78;
      filter: drop-shadow(0 14px 18px rgba(95,66,52,0.12));
    }

    .corner-lilies.top { top: -42px; left: -56px; transform: rotate(-18deg); }
    .corner-lilies.bottom { right: -54px; bottom: -48px; transform: rotate(158deg); }

    .paper-petal {
      position: absolute;
      width: 18px;
      height: 30px;
      border-radius: 90% 0 90% 0;
      background: linear-gradient(135deg, #fff, #FADADD);
      opacity: 0.65;
      transform: rotate(var(--r));
      left: var(--x);
      top: var(--y);
      box-shadow: 0 7px 14px rgba(95,66,52,0.1);
    }

    .lily-svg .stem { stroke: #9BA979; stroke-width: 2.2; fill: none; opacity: 0.65; }
    .lily-svg .leaf { fill: #B9B987; opacity: 0.58; }
    .lily-svg .petal-main { fill: #FFF8F3; stroke: rgba(183,119,130,0.25); stroke-width: 1; }
    .lily-svg .petal-blush { fill: #FADADD; opacity: 0.74; }
    .lily-svg .stamen { stroke: #D8A65F; stroke-width: 1.4; stroke-linecap: round; }

    @media (max-width: 680px) {
      .pigeon { left: 4%; top: 18%; width: 104px; }
      .caption { top: 7%; font-size: 11px; }
      .envelope-wrap { width: 88vw; height: 280px; }
      .wax-seal { top: 150px; width: 84px; height: 84px; font-size: 39px; }
      .instruction { font-size: 16px; bottom: 7%; }
      .letter-paper { width: 88vw; min-height: 68vh; padding: 44px 32px; }
      .corner-lilies { opacity: 0.55; }
    }
  </style>
</head>

<body>
  <div class="grain"></div>

  <section class="screen landing">
    <div class="ambient" aria-hidden="true">
      <span class="heart" style="left:8%; top:28%; --speed:7s;">♡</span>
      <span class="heart" style="left:18%; top:72%; --speed:8.5s;">♡</span>
      <span class="heart" style="left:74%; top:18%; --speed:7.8s;">♡</span>
      <span class="heart" style="left:84%; top:64%; --speed:9s;">♡</span>
      <span class="heart" style="left:51%; top:12%; --speed:8s;">♡</span>
      <span class="heart" style="left:35%; top:84%; --speed:7.4s;">♡</span>

      <span class="petal" style="left:12%; --fall:18s; animation-delay:-5s;"></span>
      <span class="petal" style="left:61%; --fall:22s; animation-delay:-12s;"></span>
      <span class="petal" style="left:88%; --fall:20s; animation-delay:-8s;"></span>
    </div>

    <div class="lily-cluster left-top">{{LILY}}</div>
    <div class="lily-cluster right-bottom">{{LILY}}</div>
    <div class="lily-cluster left-bottom">{{LILY}}</div>
    <div class="lily-cluster right-top">{{LILY}}</div>

    <div class="centerpiece">
      

      <div class="pigeon" aria-hidden="true">
        <svg viewBox="0 0 180 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M58 58C70 32 101 26 126 42C106 45 91 55 80 73C71 71 63 67 58 58Z" fill="#EDE4DC" stroke="#B99B8A" stroke-width="2"/>
          <path d="M87 45C60 16 31 16 11 31C38 31 56 47 70 70" fill="#F8F1EA" stroke="#B99B8A" stroke-width="2"/>
          <path d="M76 69C45 72 26 88 18 101C44 94 70 92 94 78" fill="#F8F1EA" stroke="#B99B8A" stroke-width="2"/>
          <circle cx="121" cy="39" r="17" fill="#EFE6DE" stroke="#B99B8A" stroke-width="2"/>
          <circle cx="126" cy="35" r="2.2" fill="#5B3D3E"/>
          <path d="M137 39L158 34L140 49Z" fill="#D9A56B" stroke="#B78352" stroke-width="1.5"/>
          <path d="M119 58L131 82M109 58L113 82" stroke="#B99B8A" stroke-width="2" stroke-linecap="round"/>
          <rect x="130" y="72" width="34" height="22" rx="2" fill="#FFF8F3" stroke="#C7A996"/>
          <path d="M130 72L147 85L164 72" stroke="#C7A996"/>
        </svg>
      </div>

      <div class="envelope-wrap" id="envelopeWrap" aria-label="Open love letter">
        <div class="inner-letter"></div>
        <div class="flap"></div>
        <div class="envelope"></div>
        <button class="wax-seal" id="seal" aria-label="Tap wax seal to open letter">
          <span class="seal-shine"></span>
          <img src="seal.png" alt="wax seal with J" />
        </button>
      </div>

      
    </div>
  </section>

  <section class="screen letter-screen">
    <div class="ambient" aria-hidden="true">
      <span class="heart" style="left:10%; top:24%; --speed:8s;">♡</span>
      <span class="heart" style="left:87%; top:30%; --speed:7.5s;">♡</span>
      <span class="heart" style="left:18%; top:78%; --speed:9s;">♡</span>
      <span class="heart" style="left:76%; top:82%; --speed:8.2s;">♡</span>
    </div>

    <article class="letter-paper">
      <div class="corner-lilies top">{{LILY}}</div>
      <div class="corner-lilies bottom">{{LILY}}</div>

      <span class="paper-petal" style="--x:74%; --y:19%; --r:28deg;"></span>
      <span class="paper-petal" style="--x:17%; --y:72%; --r:-24deg;"></span>
      <span class="paper-petal" style="--x:81%; --y:68%; --r:54deg;"></span>

      
      <p class="letter-text" id="letterText"></p>
    </article>
  </section>

  <template id="lilyTemplate">
    <svg class="lily-svg" viewBox="0 0 240 210" xmlns="http://www.w3.org/2000/svg">
      <path class="stem" d="M67 192C91 129 105 89 130 44"/>
      <path class="stem" d="M95 196C112 147 135 101 184 60"/>
      <path class="leaf" d="M88 143C53 129 32 139 18 160C47 162 70 156 88 143Z"/>
      <path class="leaf" d="M119 123C151 101 178 105 199 122C168 132 143 131 119 123Z"/>
      <g transform="translate(106 18) rotate(-8)">
        <path class="petal-main" d="M37 46C14 21 21 2 42 19C47 -4 68 -6 64 23C91 10 96 34 69 48C91 65 75 84 54 63C43 92 21 83 33 58C4 64 -6 42 25 39Z"/>
        <path class="petal-blush" d="M42 22C43 39 45 49 52 63C54 47 56 35 64 23C56 26 49 25 42 22Z"/>
        <path class="stamen" d="M48 44L37 31M50 45L54 27M53 46L68 36"/>
      </g>
      <g transform="translate(152 46) rotate(20) scale(.82)">
        <path class="petal-main" d="M37 46C14 21 21 2 42 19C47 -4 68 -6 64 23C91 10 96 34 69 48C91 65 75 84 54 63C43 92 21 83 33 58C4 64 -6 42 25 39Z"/>
        <path class="petal-blush" d="M42 22C43 39 45 49 52 63C54 47 56 35 64 23C56 26 49 25 42 22Z"/>
        <path class="stamen" d="M48 44L37 31M50 45L54 27M53 46L68 36"/>
      </g>
      <g transform="translate(52 66) rotate(-26) scale(.74)">
        <path class="petal-main" d="M37 46C14 21 21 2 42 19C47 -4 68 -6 64 23C91 10 96 34 69 48C91 65 75 84 54 63C43 92 21 83 33 58C4 64 -6 42 25 39Z"/>
        <path class="petal-blush" d="M42 22C43 39 45 49 52 63C54 47 56 35 64 23C56 26 49 25 42 22Z"/>
        <path class="stamen" d="M48 44L37 31M50 45L54 27M53 46L68 36"/>
      </g>
    </svg>
  </template>

  <script>
    const lilyMarkup = document.getElementById("lilyTemplate").innerHTML;
    document.body.innerHTML = document.body.innerHTML.replaceAll("{{LILY}}", lilyMarkup);

    const seal = document.getElementById("seal");
    const envelopeWrap = document.getElementById("envelopeWrap");
    const letterText = document.getElementById("letterText");

    const letter = `Dear Jazz,\n\nI just wanted to tell you in the corniest way ever that I love you. ahahahaha.\n\nxoxo,\nGauri`;

    function renderLetter() {
      letterText.textContent = letter;
    }

    function openLetter(event) {
      event.stopPropagation();
      if (document.body.classList.contains("open")) return;

      document.body.classList.add("seal-clicked");
      setTimeout(() => {
        renderLetter();
        document.body.classList.add("open");
      }, 1450);
    }

    seal.addEventListener("click", openLetter);
    envelopeWrap.addEventListener("click", openLetter);
  </script>
